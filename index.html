<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Simulador de Scoreboard</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

  <h1>Simulador NBA Scoreboard</h1>

  <div id="seleccion-equipos">
    <label for="selectLocal">Local:</label>
    <select id="selectLocal"></select>
    
    <label for="selectVisitante">Visitante:</label>
    <select id="selectVisitante"></select>

    <button id="btnAleatorio">Partido Aleatorio</button>
  </div>

  <div class="controles-partido">
    <button id="btnIniciar">Iniciar partido</button>
    <button id="btnFinalizar">Finalizar partido</button>
  </div>

  <p id="estado">Esperando inicio...</p>

  <div id="contenedor-principal">
    <div class="columna-equipo local">
      <img id="imgLocal" src="assets/placeholder.png" alt="Escudo Local" class="escudo">
      <h2 id="nombreLocal">Equipo Local</h2>
      <div class="marcador-grande"><span id="puntosLocal">0</span></div>
      
      <div class="puntos-botones">
        <button class="btnPunto" data-equipo="local" data-valor="1">+1</button>
        <button class="btnPunto" data-equipo="local" data-valor="2">+2</button>
        <button class="btnPunto" data-equipo="local" data-valor="3">+3</button>
      </div>

      <div class="lista-jugadores">
        <h3>Jugadores</h3>
        <ul id="listaLocal"></ul>
      </div>
    </div>

    <div class="separador">VS</div>

    <div class="columna-equipo visitante">
      <img id="imgVisitante" src="assets/placeholder.png" alt="Escudo Visitante" class="escudo">
      <h2 id="nombreVisitante">Equipo Visitante</h2>
      <div class="marcador-grande"><span id="puntosVisitante">0</span></div>

      <div class="puntos-botones">
        <button class="btnPunto" data-equipo="visitante" data-valor="1">+1</button>
        <button class="btnPunto" data-equipo="visitante" data-valor="2">+2</button>
        <button class="btnPunto" data-equipo="visitante" data-valor="3">+3</button>
      </div>

      <div class="lista-jugadores">
        <h3>Jugadores</h3>
        <ul id="listaVisitante"></ul>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
